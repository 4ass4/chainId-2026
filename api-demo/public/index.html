<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DemoChain BY</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; background: #1a1a2e; color: #eee; min-height: 100vh; }
    h1 { font-size: 1.5rem; }
    h2 { font-size: 1.1rem; margin-top: 2rem; }
    .card { background: #16213e; border-radius: 8px; padding: 1.5rem; max-width: 560px; margin: 1rem 0; }
    .row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-start; }
    .col { flex: 1; min-width: 200px; }
    .block { background: #0f3460; border-radius: 6px; padding: 1rem; margin: 0.5rem 0; }
    input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border: 1px solid #0f3460; border-radius: 4px; background: #0f3460; color: #fff; }
    button { background: #e94560; color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #ff6b6b; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 1rem; padding: 0.75rem; background: #0f3460; border-radius: 4px; font-size: 0.9rem; word-break: break-all; }
    .result .fee { margin-top: 0.5rem; font-size: 0.85rem; opacity: 0.95; }
    .link { color: #e94560; }
  </style>
</head>
<body>
  <h1>DemoChain BY</h1>
  <p><a href="/dashboard.html" style="color:#e94560">Дашборд (TPS, блоки, валидаторы)</a></p>

  <h2>Симуляция моста TON → CONS</h2>
  <div class="card">
    <p>Адрес получателя CONS:</p>
    <input type="text" id="address" placeholder="0x..." value="">
    <button id="bridge">Bridge TON → CONS (100 CONS)</button>
    <div id="result" class="result" style="display:none;"></div>
  </div>

  <h2>BYNEX vs Currency — ордера</h2>
  <div class="card">
    <div class="row">
      <div class="col">
        <div class="block"><strong>BYNEX</strong> продаёт 1000 TON</div>
      </div>
      <div class="col">
        <div class="block"><strong>Currency</strong> покупает 1000 TON</div>
      </div>
    </div>
    <button id="execute">Исполнить</button>
    <div id="orderResult" class="result" style="display:none;"></div>
  </div>
  <script>
    const API = window.location.origin;
    const addr = document.getElementById('address');
    const btn = document.getElementById('bridge');
    const result = document.getElementById('result');

    if (window.ethereum) {
      window.ethereum.request({ method: 'eth_requestAccounts' }).then(accs => {
        if (accs[0]) addr.value = accs[0];
      }).catch(() => {});
    }

    function renderTxResult(data, el) {
      if (data.success) {
        const feeHtml = data.fee ? `<div class="fee">Комиссия: ${data.fee.feeEth} ETH (gas: ${data.fee.gasUsed})</div>` : '';
        el.innerHTML = `Tx: <a class="link" href="${data.explorerUrl}" target="_blank">${data.txHash}</a>${feeHtml}`;
      } else {
        el.textContent = data.error || 'Ошибка';
      }
    }

    document.getElementById('execute').onclick = async () => {
      const orderResult = document.getElementById('orderResult');
      orderResult.textContent = 'Ожидание...';
      orderResult.style.display = 'block';
      try {
        const r = await fetch(`${API}/orders/execute`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ exchangeSell: 'BYNEX', exchangeBuy: 'Currency', amount: '1000000000' })
        });
        const data = await r.json();
        renderTxResult(data, orderResult);
      } catch (e) {
        orderResult.textContent = 'Ошибка: ' + e.message;
      }
    };

    btn.onclick = async () => {
      const address = addr.value.trim();
      if (!address || !/^0x[a-fA-F0-9]{40}$/.test(address)) {
        result.textContent = 'Введите валидный адрес (0x...)';
        result.style.display = 'block';
        return;
      }
      btn.disabled = true;
      result.textContent = 'Ожидание...';
      result.style.display = 'block';
      try {
        const r = await fetch(`${API}/bridge/ton-to-cons`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address })
        });
        const data = await r.json();
        renderTxResult(data, result);
      } catch (e) {
        result.textContent = 'Ошибка: ' + e.message;
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>
