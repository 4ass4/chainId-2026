services:
  genesis-generator:
    image: hyperledger/besu:24.8.0
    container_name: genesis-gen
    user: root
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: operator generate-blockchain-config --config-file=/workspace/qbftConfigFile.json --to=/workspace/networkFiles --private-key-file-name=key
    profiles:
      - gen
